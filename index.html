<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aim Trainer</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:#fff;
text-align:center;
overflow:hidden;
}
#game{
position:relative;
width:100vw;
height:100vh;
}
#target{
position:absolute;
width:60px;
height:60px;
border-radius:50%;
background:red;
display:none;
cursor:pointer;
}
#info{
position:fixed;
top:10px;
left:10px;
font-size:20px;
}
button{
padding:10px 20px;
font-size:18px;
margin-top:20px;
}
</style>
</head>
<body>

<div id="info">
Điểm: <span id="score">0</span>
</div>

<button onclick="start()">Bắt đầu</button>

<div id="game">
<div id="target"></div>
</div>

<script>
let score=0;
const target=document.getElementById("target");

function randomTarget(){
target.style.display="block";
target.style.left=Math.random()*(window.innerWidth-70)+"px";
target.style.top=Math.random()*(window.innerHeight-70)+"px";
}

function start(){
score=0;
document.getElementById("score").innerText=0;
randomTarget();
}

target.onclick=function(){
score++;
document.getElementById("score").innerText=score;
randomTarget();
}
</script>

</body>
  </html>
