<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FF Booster Web</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:#fff;
}

.container{
max-width:400px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
border-radius:15px;
padding:20px;
margin-top:20px;
}

h1{
text-align:center;
}

.info{
margin:8px 0;
}

.switch{
position:relative;
display:inline-block;
width:60px;
height:34px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#666;
transition:.3s;
border-radius:34px;
}

.slider:before{
content:"";
position:absolute;
width:26px;
height:26px;
left:4px;
bottom:4px;
background:#fff;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{
background:#00c853;
}

input:checked + .slider:before{
transform:translateX(26px);
}

#status{
margin-top:15px;
font-size:18px;
font-weight:bold;
text-align:center;
}
</style>

</head>
<body>

<div class="container">

<h1>🚀 FF Booster</h1>

<div class="card">

<div class="info">
CPU:
<span id="cpu"></span>
</div>

<div class="info">
RAM:
<span id="ram"></span>
</div>

<div class="info">
Pin:
<span id="battery">...</span>
</div>

<br>

<center>

<label class="switch">

<input type="checkbox" id="boost">

<span class="slider"></span>

</label>

</center>

<div id="status">
🔴 Booster đang tắt
</div>

</div>

</div>

<script>

document.getElementById("cpu").innerText =
navigator.hardwareConcurrency || "Không hỗ trợ";

document.getElementById("ram").innerText =
navigator.deviceMemory ?
navigator.deviceMemory+" GB" :
"Không hỗ trợ";

if(navigator.getBattery){

navigator.getBattery().then(function(b){

function update(){

document.getElementById("battery").innerText =
Math.round(b.level*100)+"%";

}

update();

b.onlevelchange=update;

});

}

const boost=document.getElementById("boost");

const status=document.getElementById("status");

boost.addEventListener("change",function(){

if(this.checked){

status.innerHTML="🟢 Booster đã bật";

document.body.style.background="#000";

}else{

status.innerHTML="🔴 Booster đang tắt";

document.body.style.background="#0f172a";

}

});

</script>

</body>
  </html>
