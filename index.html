<!DOCTYPE html>
<html>
<head>
  <title>Web của Nam</title>
</head>

<body>

<h1>Web của Nam 😎</h1>

<button onclick="toggleText()">Bật / Tắt</button>

<p id="noidung">Đây là nội dung có thể ẩn/hiện 🔥</p>

<script>
function toggleText() {
  var x = document.getElementById("noidung");
  if (x.style.display === "none") {
    x.style.display = "block";
  } else {
    x.style.display = "none";
  }
}
</script>

</body>
</html>
