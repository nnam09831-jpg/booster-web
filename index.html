<!DOCTYPE html>
<html>
<head>
  <title>Nam Booster</title>
</head>

<body>

<h1>Nam Booster 🚀</h1>

<button onclick="toggleText()">Bật / Tắt</button>

<p id="noidung">Tool booster siêu cấp 🔥</p>

<script>
function toggleText() {
  var x = document.getElementById("noidung");
  if (x.style.display === "none") {
    x.style.display = "block";
  } else {
    x.style.display = "none";
  }
}
</script>

</body>
</html>
