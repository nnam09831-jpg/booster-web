<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Booster Web</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111827;
color:white;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:#1f2937;
margin:15px;
padding:20px;
border-radius:12px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

#boost{
background:#16a34a;
color:white;
}

#check{
background:#2563eb;
color:white;
}

#status{
margin-top:15px;
font-size:18px;
}
</style>

</head>
<body>

<div class="container">

<h1>🚀 FF Booster Web</h1>

<div class="card">

<p>CPU: <span id="cpu"></span></p>

<p>RAM: <span id="ram"></span></p>

<p>Mạng: <span id="net"></span></p>

<p>Pin: <span id="battery">Đang tải...</span></p>

<button id="boost">🚀 Chuẩn bị chơi</button>

<button id="check">📊 Kiểm tra thiết bị</button>

<div id="status"></div>

</div>

</div>

<script>

cpu.innerText=navigator.hardwareConcurrency||"Không hỗ trợ";

ram.innerText=navigator.deviceMemory?
navigator.deviceMemory+" GB":"Không hỗ trợ";

net.innerText=navigator.connection?
navigator.connection.effectiveType:"Không hỗ trợ";

if(navigator.getBattery){

navigator.getBattery().then(function(b){

function update(){

battery.innerText=Math.round(b.level*100)+"%";

}

update();

b.onlevelchange=update;

});

}

boost.onclick=function(){

document.body.style.background="#000";

status.innerHTML="✅ Chế độ chuẩn bị chơi đã bật.<br>• Hãy đóng ứng dụng nền.<br>• Kết nối mạng ổn định sẽ giúp trải nghiệm tốt hơn.";

}

check.onclick=function(){

let score=100;

if(navigator.deviceMemory&&navigator.deviceMemory<4)score-=20;

if(navigator.hardwareConcurrency<4)score-=20;

status.innerHTML="<h2>Điểm thiết bị: "+score+"/100</h2>";

}

</script>

</body>
  </html>
